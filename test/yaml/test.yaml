- scope: global
  environment: "docker"
  parallel: False
  var:
    map.gtf: "./test/test-input/caenorhabditis_elegans.115.no.rRNA.gtf"
    mk.deseq2_output: "./test/test-output/deseq2_output/"
    map.kallisto_output: "./test/test-input/kallisto_output/"
    circRNA: "None"
    cytoscape_host: ""
- scope: process
  name: "annotations"
  var:
    biomart_dataset: "celegans_gene_ensembl"
    biomart_host: "http://sep2025.archive.ensembl.org/biomart/"
    biotypes_go: "./test/test-output/biotypes_go.txt"
- scope: process
  name: "parse_submission"
  var:
    samplestable: ""
    read1_suffix: '.READ_1.fastq.gz'
- scope: process
  name: "david"
  var:
    daviddatabase: "ENSEMBL_GENE_ID"
    DAVIDUSER: ""
- scope: process
  name: "cellplot"
  var:
    filetype: "tsv"
    nterms: "15"
- scope: process
  name: "rcistarget"
  var:
    rcis_db: ""
- scope: process
  name: "string"
  var:
    biomart_host: "http://sep2025.archive.ensembl.org/biomart/"
    species: "caenorhabditis elegans"

- scope: hash
  include: 
    - ./test/test-output/deseq2_output/group_daf2_vs_N2_treated.results.tsv
    # - ./test/test-output/deseq2_output/annotated/group_daf2_treated_vs_N2.results.tsv
    # - ./test/test-output/deseq2_output/annotated/group_N2_treated_vs_N2.topGO.tsv
  overwrite: true # overwrite any existing hash already present on the logs folder