# a slurm and apptainer template for our hpc named cluster
- scope: global
  environment: "apptainer"
  automated_mount: False
  environment_apptainer: { "-B":"/nexus:/nexus" }
  manager: slurm
  manager_slurm: { "-p":"cluster,dedicated" }

- scope: process
  name: [ "get_ip", "release_ip" ]
  manager: local